name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Project
      run: |

        mkdir app
        mkdir -p app/src/main/java/com/wrapper/indomaret
        mkdir -p app/src/main/res/values

        cat > settings.gradle << 'EOF'
        rootProject.name='wrapper'
        include ':app'
        EOF

        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF

        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.wrapper.indomaret'
            compileSdk 34

            defaultConfig {
                applicationId "com.wrapper.indomaret"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        EOF

        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.wrapper.indomaret">

            <application
                android:label="Wrapper"
                android:theme="@android:style/Theme.Light">

                <activity
                    android:name=".MainActivity"
                    android:exported="true">

                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>

                </activity>

            </application>

        </manifest>
        EOF

        cat > app/src/main/java/com/wrapper/indomaret/MainActivity.java << 'EOF'
        package com.wrapper.indomaret;

        import android.app.Activity;
        import android.app.ActivityManager;
        import android.content.Intent;
        import android.graphics.Bitmap;
        import android.graphics.Canvas;
        import android.graphics.Paint;
        import android.os.Bundle;
        import android.widget.LinearLayout;
        import android.widget.Button;
        import android.view.View;

        public class MainActivity extends Activity {

            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);

                LinearLayout layout = new LinearLayout(this);
                layout.setOrientation(LinearLayout.VERTICAL);

                for(int i=1;i<=10;i++){

                    Button btn = new Button(this);
                    btn.setText(String.valueOf(i));

                    final int screen = i;

                    btn.setOnClickListener(new View.OnClickListener(){
                        public void onClick(View v){

                            try{

                                Intent intent = new Intent();
                                intent.setClassName(
                                    "com.indomaret.klikindomaret",
                                    "edts.klikidm.android.feature_home.ui.v2.HomeV2Activity"
                                );

                                intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                intent.addFlags(Intent.FLAG_ACTIVITY_MULTIPLE_TASK);
                                intent.addFlags(Intent.FLAG_ACTIVITY_NEW_DOCUMENT);

                                intent.putExtra("screen_id",screen);

                                startActivity(intent);

                                setTitle(String.valueOf(screen));

                                Bitmap icon = createNumberIcon(screen);

                                ActivityManager.TaskDescription task =
                                    new ActivityManager.TaskDescription(
                                        String.valueOf(screen),
                                        icon,
                                        0
                                    );

                                setTaskDescription(task);

                            }catch(Exception e){
                                e.printStackTrace();
                            }

                        }
                    });

                    layout.addView(btn);
                }

                setContentView(layout);
            }

            private Bitmap createNumberIcon(int number){

                int size = 192;

                Bitmap bmp = Bitmap.createBitmap(size,size,Bitmap.Config.ARGB_8888);
                Canvas canvas = new Canvas(bmp);

                Paint paint = new Paint();
                paint.setTextSize(120);
                paint.setTextAlign(Paint.Align.CENTER);
                paint.setAntiAlias(true);

                canvas.drawText(
                    String.valueOf(number),
                    size/2,
                    size/2 + 40,
                    paint
                );

                return bmp;
            }

        }
        EOF

    - name: Setup Gradle
      run: |
        gradle wrapper

    - name: Build APK
      run: |
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/debug/app-debug.apk
